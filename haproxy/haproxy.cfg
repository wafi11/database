global
    maxconn 200
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    retries 3
    timeout client   30m
    timeout connect  4s
    timeout server   30m
    timeout check    5s

listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats auth admin:admin

frontend pg_primary_front
    bind *:5000
    default_backend pg_primary_back

backend pg_primary_back
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node-1 pg-node-1:5432 check port 8008
    server pg-node-2 pg-node-2:5432 check port 8008
    server pg-node-3 pg-node-3:5432 check port 8008


frontend pg_replicas_front
    bind *:5001
    default_backend pg_replicas_back

backend pg_replicas_back
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node-1 pg-node-1:5432 check port 8008
    server pg-node-2 pg-node-2:5432 check port 8008
    server pg-node-3 pg-node-3:5432 check port 8008
