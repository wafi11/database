scope: pg-ha-cluster
name: pg-node-3

restapi:
  listen: 0.0.0.0:8008
  connect_address: pg-node-3:8008

etcd3:
  hosts: etcd:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        wal_keep_size: 128
        max_wal_senders: 10
        max_replication_slots: 10
        checkpoint_completion_target: 0.9
        wal_log_hints: "on"
        archive_mode: "off"
        archive_command: "/bin/true"

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5

  users:
    postgres:
      password: postgres_pass
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: pg-node-3:5432
  data_dir: /data/patroni
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: replicator
      password: replicator_pass
    superuser:
      username: postgres
      password: postgres_pass
  parameters:
    unix_socket_directories: "."
    log_destination: stderr
    logging_collector: "off"

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
